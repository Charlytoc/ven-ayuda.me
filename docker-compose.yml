name: ven-ayuda-stack

services:
  postgres:
    image: "postgres:17"
    container_name: "db-${CONTAINER_SUFFIX}"
    restart: "unless-stopped"
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
      - "POSTGRES_DB=${POSTGRES_DB:-startup-db}"
      - "POSTGRES_USER=${POSTGRES_USER:-startup-user}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-startup_password}"
    volumes:
      - "./django/data/postgres:/var/lib/postgresql/data"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready --username ${POSTGRES_USER:-startup-user} --dbname ${POSTGRES_DB:-startup-db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: "redis-${CONTAINER_SUFFIX}"
    restart: "unless-stopped"
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - "redis_data:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    container_name: "django-${CONTAINER_SUFFIX}"
    env_file: .env
    build:
      context: ./django
      dockerfile: Dockerfile
    volumes:
      - ./django:/app
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/openapi.json')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  celery:
    container_name: "celery-${CONTAINER_SUFFIX}"
    env_file: .env
    build:
      context: ./django
      dockerfile: Dockerfile
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A config worker -l debug --concurrency=4
    volumes:
      - ./django:/app
    depends_on:
      - redis
      - postgres

  celery-beat:
    container_name: "beat-${CONTAINER_SUFFIX}"
    env_file: .env
    build:
      context: ./django
      dockerfile: Dockerfile
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A config beat -l debug --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./django:/app
    depends_on:
      - redis
      - postgres

  flower:
    container_name: "flower-${CONTAINER_SUFFIX}"
    env_file: .env
    build:
      context: ./django
      dockerfile: Dockerfile
    command: celery -A config flower --port=5555 --address=0.0.0.0
    ports:
      - "${FLOWER_HOST_PORT:-5555}:5555"
    volumes:
      - ./django:/app
    depends_on:
      - redis
      - celery

  nginx:
    container_name: "nginx-${CONTAINER_SUFFIX}"
    build:
      context: ./nginx
      dockerfile: Dockerfile
    environment:
      # WEB_PORT is passed so the template can resolve host.docker.internal:${WEB_PORT}
      - WEB_PORT=${WEB_PORT:-3000}
    ports:
      - "${ENTRYPOINT_PORT:-9000}:80"
    depends_on:
      django:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    name: ven-ayuda-redis-data
